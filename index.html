<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Viewport estrito para comportamento de App Nativo (sem zoom, sem redimensionamento) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Meta tags para PWA (Progressive Web App) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <title>GameVault App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Clássico -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>

    <!-- ExcelJS (Biblioteca para gerar arquivos Excel XLSX sofisticados) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            color-scheme: dark; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #020617; /* Slate 950 */
        }
        
        /* Ocultar barra de rolagem visualmente, mas manter funcionalidade */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Suporte aprimorado para Safe Area (Evita sobreposição das navbars e status bars) */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px) !important; }
        .pb-safe-modal { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 48px) !important; } 
        /* Adicionada margem extra de 12px ao topo para a barra do Android não sobrepor os botões */
        .pt-safe { padding-top: calc(env(safe-area-inset-top, 0px) + 12px) !important; }
        
        /* Animações nativas (Bottom Sheet e Fades) */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        /* Efeito de luz azul intensa para a logo ao clicar */
        .logo-glow-active {
            filter: drop-shadow(0 0 25px rgba(59,130,246,1)) brightness(1.4) !important;
        }
    </style>
</head>
<body class="bg-slate-950 flex justify-center h-[100dvh] overflow-hidden relative">

    <!-- APP CONTAINER -->
    <div id="app-container" class="w-full max-w-md h-full bg-slate-950 relative overflow-hidden flex flex-col pt-safe">

        <!-- HEADER TOP (z-50 garantido) -->
        <header class="bg-slate-950/90 backdrop-blur-md px-5 h-[65px] shrink-0 flex items-center justify-between z-50 border-b border-slate-800/50 relative">
            <button onclick="togglePlatformMenu()" class="flex items-center gap-2 outline-none active:scale-95 transition-transform text-left py-2">
                <img id="main-app-logo" src="https://raw.githubusercontent.com/Marcelo9035/IMAGES/refs/heads/main/Novo%20Projeto.png" 
                     alt="GameVault Logo" 
                     class="h-8 w-auto object-contain drop-shadow-[0_0_8px_rgba(59,130,246,0.6)] transition-all duration-300" />
                <div class="flex items-center gap-1.5">
                    <span id="current-platform-title" class="font-bold text-xl text-white tracking-tight">GameVault</span>
                    <i id="platform-menu-chevron" data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300"></i>
                </div>
            </button>
            
            <!-- Indicador de Status Cloud Pequeno -->
            <div class="flex items-center gap-1.5 px-2.5 py-1 bg-slate-900 border border-slate-800 rounded-full shrink-0">
                <span id="firebase-status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_5px_currentColor]"></span>
                <span id="firebase-status-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Lendo</span>
            </div>
        </header>

        <!-- MENU OCULTO DE PLATAFORMAS E AÇÕES (DROPDOWN / MENU SECRETO) -->
        <div id="platform-dropdown" class="absolute top-[65px] left-0 w-full bg-slate-900/95 backdrop-blur-2xl border-b border-slate-800 z-40 flex flex-col px-4 py-5 shadow-[0_20px_40px_rgba(0,0,0,0.6)] transition-all duration-300 -translate-y-full opacity-0 pointer-events-none">
            
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-1">Selecione o Filtro</h3>

            <!-- Gride de Plataformas do Dropdown -->
            <div class="grid grid-cols-3 gap-2" id="dropdown-platforms-container">
                <!-- Renderizado via JS -->
            </div>

            <!-- SEÇÃO DE FERRAMENTAS DE DADOS (Exportar/Importar TXT e XLSX) -->
            <div class="mt-5 pt-4 border-t border-slate-800/50 flex flex-col gap-2.5">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Ferramentas de Banco de Dados</h3>
                
                <!-- Botão XLSX -->
                <button onclick="exportarPlanilhaSofisticada(this)" class="w-full text-[11px] font-bold text-emerald-400 bg-emerald-500/10 px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-500/20 active:scale-95 transition-all border border-emerald-500/20 shadow-[0_4px_15px_rgba(16,185,129,0.15)]">
                    <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Relatório XLSX Avançado
                </button>

                <!-- Botões TXT e HTML (Export / Import / HTML) -->
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="exportarTXT(this)" class="w-full text-[10px] font-bold text-blue-400 bg-blue-500/10 py-2.5 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-blue-500/20 active:scale-95 transition-all border border-blue-500/20">
                        <i data-lucide="download-cloud" class="w-4 h-4"></i> Exp. TXT
                    </button>
                    <button onclick="document.getElementById('import-txt-input').click()" class="w-full text-[10px] font-bold text-amber-400 bg-amber-500/10 py-2.5 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-amber-500/20 active:scale-95 transition-all border border-amber-500/20">
                        <i data-lucide="file-code-2" class="w-4 h-4"></i> Imp. TXT
                    </button>
                    <button onclick="exportarVisualizadorHTML(this)" class="w-full text-[10px] font-bold text-purple-400 bg-purple-500/10 py-2.5 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-purple-500/20 active:scale-95 transition-all border border-purple-500/20">
                        <i data-lucide="layout-template" class="w-4 h-4"></i> Gerar HTML
                    </button>
                    <input type="file" id="import-txt-input" accept=".txt" class="hidden" onchange="importarTXT(event)">
                </div>
            </div>
        </div>

        <!-- MAIN SCROLLABLE CONTENT -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden relative scrollbar-hide bg-slate-950 z-20">
            
            <!-- Barra de Pesquisa Fixa -->
            <div class="px-4 py-3 sticky top-0 bg-slate-950/95 backdrop-blur-xl z-10 mb-2 flex gap-2 items-center">
                <div class="relative group flex-1 shadow-sm">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="Buscar jogo..." class="w-full pl-11 pr-4 py-3 bg-slate-900 border border-slate-800 rounded-2xl text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder-slate-500" />
                </div>
            </div>

            <!-- SESSÃO JOGANDO AGORA -->
            <div id="playing-now-section" class="px-4 mb-4 hidden flex-col gap-2">
                <h2 class="text-white font-bold text-sm flex items-center gap-1.5"><i data-lucide="play-circle" class="w-4 h-4 text-blue-400"></i> Jogando Agora</h2>
                <div id="playing-now-grid" class="flex gap-3 overflow-x-auto scrollbar-hide pb-2">
                    <!-- Renderizado via JS -->
                </div>
            </div>

            <!-- Grid de Jogos (Sempre 2 colunas no App) -->
            <div class="px-4 pb-28">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h2 id="section-title" class="text-white font-bold text-lg">Coleção</h2>
                    <span class="text-xs font-medium bg-slate-900 text-blue-400 px-2.5 py-1 rounded-full border border-blue-500/20"><span id="display-count">0</span> jogos</span>
                </div>

                <div id="games-grid" class="grid grid-cols-2 gap-3 w-full">
                    <!-- Renderizado via JS -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center animate-fade-in">
                    <div class="p-5 bg-slate-900 rounded-full mb-3 border border-slate-800">
                        <i data-lucide="ghost" class="w-10 h-10 text-slate-600"></i>
                    </div>
                    <h2 class="text-base font-bold text-slate-300 mb-1">Nenhum jogo</h2>
                    <p class="text-[11px] text-slate-500 max-w-[200px]">Sem jogos para mostrar neste filtro.</p>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION BAR (Padrão de Apps Nativos) -->
        <nav class="absolute bottom-0 w-full max-w-md bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 z-30 pb-safe">
            <div class="flex justify-around items-center h-16 relative px-2">
                
                <!-- Coleção (Home) -->
                <button onclick="setPlatformFilter('all'); window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-blue-400 w-16 transition-transform active:scale-95">
                    <i data-lucide="library" class="w-5 h-5"></i>
                    <span class="text-[9px] font-bold">Coleção</span>
                </button>
                
                <!-- Central FAB (Floating Action Button) Adicionar -->
                <div class="relative -top-5">
                    <button onclick="openNewGameModal()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-[0_8px_20px_rgba(59,130,246,0.6)] border-[5px] border-slate-950 hover:bg-blue-500 active:scale-90 transition-all">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>

                <!-- Desejos Atalho -->
                <button onclick="setPlatformFilter('wishlist'); window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-slate-500 hover:text-yellow-400 w-16 transition-transform active:scale-95">
                    <i data-lucide="star" class="w-5 h-5"></i>
                    <span class="text-[9px] font-medium">Desejos</span>
                </button>
            </div>
        </nav>

        <!-- MODAL BOTTOM SHEET (Adicionar / Editar) -->
        <div id="game-modal" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex-col justify-end hidden">
            
            <div class="bg-slate-900 w-full h-[95%] rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden border-t border-slate-800 animate-slide-up relative">
                
                <!-- Pull Indicator -->
                <div class="w-full flex justify-center py-3 shrink-0" onclick="closeModal()">
                    <div class="w-10 h-1.5 bg-slate-700 rounded-full"></div>
                </div>

                <!-- Header Modal -->
                <div class="px-5 pb-3 border-b border-slate-800 shrink-0 flex justify-between items-center">
                    <h2 id="modal-title-text" class="text-base font-bold text-white flex items-center gap-2">
                        <i id="modal-title-icon" data-lucide="plus-circle" class="w-5 h-5 text-blue-400"></i>
                        <span>Adicionar Jogo</span>
                    </h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-800 text-slate-400 hover:text-white rounded-full">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Modal Scrollable Content -->
                <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-5 pb-48 scrollbar-hide bg-slate-950/50">
                    
                    <!-- Busca na API (Nuvem) -->
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                        <label class="block text-[10px] font-bold text-blue-400 mb-2 uppercase tracking-widest flex items-center gap-1.5">
                            <i data-lucide="cloud-lightning" class="w-3.5 h-3.5"></i> Autopreencher
                        </label>
                        <div class="flex gap-2">
                            <select id="api-source-select" class="px-2 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-blue-400 focus:outline-none font-bold shrink-0 max-w-[80px]">
                                <option value="igdb">IGDB</option>
                                <option value="thegamesdb">GDB</option>
                            </select>
                            <input type="text" id="api-search-input" placeholder="Nome oficial..." class="flex-1 px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white placeholder-slate-500 focus:outline-none focus:border-blue-500" />
                            <button id="btn-api-search" onclick="handleApiSearch()" class="bg-blue-600 text-white px-3 py-2.5 rounded-xl text-xs font-bold shrink-0 flex items-center justify-center">
                                <i id="api-search-icon" data-lucide="search" class="w-4 h-4"></i>
                                <i id="api-search-loader" data-lucide="refresh-cw" class="w-4 h-4 animate-spin hidden"></i>
                            </button>
                        </div>
                        <div id="api-results-container" class="mt-3 max-h-40 overflow-y-auto bg-slate-950 rounded-xl border border-slate-800 divide-y divide-slate-800 hidden scrollbar-hide"></div>
                    </div>

                    <!-- Capa e Título (Lado a Lado para economizar tela) -->
                    <div class="flex gap-3 bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                        <!-- Capa -->
                        <div class="w-24 shrink-0 flex flex-col gap-2 relative">
                            <div id="modal-cover-tabs" class="flex flex-wrap gap-1 absolute -top-8 left-0 right-0 hidden justify-center"></div>
                            
                            <div id="cover-preview-container" class="aspect-[3/4] w-full bg-slate-950 rounded-xl border border-slate-800 overflow-hidden flex items-center justify-center relative">
                                <!-- Injetado -->
                            </div>
                            <input type="url" id="form-cover-url" placeholder="URL Imagem..." class="w-full px-2 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-[9px] text-center text-white focus:outline-none" />
                        </div>

                        <!-- Infos Pessoais do Jogo -->
                        <div class="flex-1 flex flex-col justify-center min-w-0">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Título do Jogo</label>
                            <input type="text" id="form-title" class="w-full px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-sm font-bold text-white placeholder-slate-600 uppercase mb-3 focus:outline-none focus:border-blue-500" placeholder="Ex: GTA V" />
                            
                            <!-- Toggle Jogando Agora -->
                            <div class="bg-slate-950 border border-slate-800 rounded-xl p-2 mb-2">
                                <label class="flex items-center gap-2 cursor-pointer w-full justify-between">
                                    <span class="font-bold text-[10px] text-blue-400 uppercase tracking-wide flex items-center gap-1"><i data-lucide="play" class="w-3 h-3"></i> Jogando?</span>
                                    <div class="relative flex items-center">
                                        <input type="checkbox" id="form-is-playing" class="peer sr-only" />
                                        <div class="w-8 h-5 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 transition-colors"></div>
                                    </div>
                                </label>
                            </div>

                            <!-- Toggle Lista de Desejos -->
                            <div class="bg-slate-950 border border-slate-800 rounded-xl p-2 mb-2">
                                <label class="flex items-center gap-2 cursor-pointer w-full justify-between">
                                    <span class="font-bold text-[10px] text-yellow-400 uppercase tracking-wide flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i> Desejos?</span>
                                    <div class="relative flex items-center">
                                        <input type="checkbox" id="form-is-wishlist" class="peer sr-only" onchange="toggleWishlistUI(this.checked)" />
                                        <div class="w-8 h-5 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-yellow-500 transition-colors"></div>
                                    </div>
                                </label>
                            </div>

                            <!-- Toggle Emprestado Minimalista -->
                            <div id="borrowed-card" class="bg-slate-950 border border-slate-800 rounded-xl p-2 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer w-full justify-between">
                                    <span id="borrowed-label" class="font-bold text-[10px] text-slate-400 uppercase tracking-wide">Emprestado?</span>
                                    <div class="relative flex items-center">
                                        <input type="checkbox" id="form-is-borrowed" class="peer sr-only" />
                                        <div class="w-8 h-5 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500 transition-colors"></div>
                                    </div>
                                </label>
                                <div id="borrowed-to-container" class="mt-2 hidden animate-fade-in">
                                    <input type="text" id="form-borrowed-to" placeholder="Nome da pessoa..." class="w-full px-2 py-1.5 bg-slate-900 border border-red-500/30 rounded-lg text-[11px] text-red-200 focus:outline-none" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tags / Filtros -->
                    <div class="flex flex-col gap-4 bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Plataformas</label>
                            <div id="form-platforms-container" class="flex flex-wrap gap-1.5"></div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Mídia</label>
                            <div id="form-medias-container" class="flex flex-wrap gap-1.5"></div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Idiomas</label>
                            <div id="form-languages-container" class="flex flex-wrap gap-1.5"></div>
                        </div>
                    </div>

                    <!-- Sinopse -->
                    <div class="flex flex-col">
                        <div class="flex justify-between items-end mb-2 px-1">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Sinopse</label>
                            <button id="btn-translate" onclick="handleTranslate()" class="text-[9px] text-blue-400 font-bold flex items-center gap-1 bg-blue-500/10 px-2 py-1 rounded-lg border border-blue-500/20 disabled:opacity-50">
                                <i id="translate-icon-normal" data-lucide="languages" class="w-3 h-3"></i>
                                <i id="translate-icon-spin" data-lucide="refresh-cw" class="w-3 h-3 animate-spin hidden"></i>
                                PT-BR
                            </button>
                        </div>
                        <textarea id="form-synopsis" class="w-full h-28 px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-[11px] text-slate-300 placeholder-slate-600 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                    </div>
                </div>

                <!-- Footer Fixado no Modal (Corrigido para Navbar Android) -->
                <div class="absolute bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 px-4 pt-4 pb-safe-modal z-30 flex gap-3">
                    <button id="btn-delete" onclick="deleteGame()" class="w-12 h-12 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl flex items-center justify-center shrink-0 hidden active:scale-95 transition-transform">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                    <button onclick="closeModal()" class="flex-1 h-12 bg-slate-800 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform">Cancelar</button>
                    <button onclick="saveGame()" class="flex-1 h-12 bg-blue-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform shadow-[0_4px_15px_rgba(59,130,246,0.3)]">Salvar</button>
                </div>
            </div>
        </div>

    </div> <!-- End App Container -->

    <div id="exit-toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-4 py-2 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[100]">
        Pressione voltar novamente para sair
    </div>

    <!-- CAPACITOR PLUGINS (UPDATER) -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorUpdater) {
                const updater = window.Capacitor.Plugins.CapacitorUpdater;
                await updater.notifyAppReady();
                try {
                    const update = await updater.download();
                    if (update && update.version) {
                        alert("Atualização encontrada! Reiniciando o aplicativo...");
                        await updater.set({ id: update.version }); 
                    }
                } catch (err) {
                    console.log("Nenhuma atualização pendente.");
                }
            }
        });
    </script>

    <!-- CAPACITOR PLUGINS (BACK BUTTON) -->
    <script>
        // --- CONTROLE DO BOTÃO VOLTAR DO ANDROID ---
        let lastBackPressTime = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                window.Capacitor.Plugins.App.addListener('backButton', () => {
                    const modal = document.getElementById('game-modal');
                    const platformDropdown = document.getElementById('platform-dropdown');
                    
                    // 1. Se o menu de plataformas estiver aberto, fecha ele
                    if (!platformDropdown.classList.contains('pointer-events-none')) {
                        togglePlatformMenu();
                        return;
                    }

                    // 2. Se o modal de adicionar/editar estiver aberto, fecha ele
                    if (!modal.classList.contains('hidden')) {
                        closeModal();
                        return;
                    }

                    // 3. Se estiver num filtro, volta para "Coleção Geral"
                    if (typeof window.filterPlatform !== 'undefined' && window.filterPlatform !== 'all') {
                        window.setPlatformFilter('all');
                        window.scrollTo({top:0, behavior:'smooth'});
                        return;
                    }

                    // 4. Se estiver na tela principal, exige toque duplo para sair
                    const currentTime = new Date().getTime();
                    if (currentTime - lastBackPressTime < 2000) {
                        // Se clicou duas vezes em menos de 2 segundos, sai do app
                        window.Capacitor.Plugins.App.exitApp();
                    } else {
                        // Primeiro clique: atualiza o tempo e mostra o aviso
                        lastBackPressTime = currentTime;
                        const toast = document.getElementById('exit-toast');
                        if (toast) {
                            toast.classList.remove('opacity-0');
                            toast.classList.add('opacity-100');
                            
                            // Esconde o aviso após 2 segundos
                            setTimeout(() => {
                                toast.classList.remove('opacity-100');

        window.exportarTXT = async function(btnElement) {
            if (!games || games.length === 0) return alert("Sua coleção está vazia!");

            const originalBtnContent = btnElement ? btnElement.innerHTML : '';
            if (btnElement) {
                btnElement.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> Gerando...';
                lucide.createIcons({ root: btnElement });
                btnElement.disabled = true;
            }

            try {
                const backupData = JSON.stringify({ app: "GameVault", timestamp: new Date().toISOString(), data: games }, null, 2);
                const fileName = `GameVault_Backup_${new Date().getTime()}.txt`;
                
                // Prepara o arquivo para o celular
                const file = new File([new Blob([backupData], { type: 'text/plain;charset=utf-8' })], fileName, { type: 'text/plain' });
                
                // 1. Tenta abrir a aba nativa de Compartilhamento do Celular
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Backup GameVault',
                        text: 'Meu backup do GameVault (TXT).'
                    });
                } 
                // 2. Se for um APK construído no Capacitor, usa os plugins nativos
                else if (window.Capacitor && window.Capacitor.isNative && window.Capacitor.Plugins.Share && window.Capacitor.Plugins.Filesystem) {
                   const base64Data = btoa(unescape(encodeURIComponent(backupData)));
                   const savedFile = await window.Capacitor.Plugins.Filesystem.writeFile({ path: fileName, data: base64Data, directory: 'CACHE' });
                   await window.Capacitor.Plugins.Share.share({ title: 'Backup TXT', url: savedFile.uri });
                } 
                // 3. Fallback para PC Clássico
                else {
                    const url = URL.createObjectURL(file);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => { document.body.removeChild(link); window.URL.revokeObjectURL(url); }, 100);
                }
                
                if (window.isPlatformMenuOpen) window.togglePlatformMenu();

            } catch (err) {
                // Agora, se algo der errado, ele avisa você na tela ao invés de falhar em silêncio
                alert("Erro ao exportar o TXT: " + err.message);
            } finally {
                if (btnElement) {
                    btnElement.innerHTML = originalBtnContent;
                    lucide.createIcons({ root: btnElement });
                    btnElement.disabled = false;
                }
            }
        };

            // Mostra o feedback visual

            toast.textContent = "Transformando TXT em layout HTML...";
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    let parsed = JSON.parse(content);
                    
                    let importedGames = [];
                    // Extrai a array caso seja do novo formato (com objeto) ou antigo
                    if (Array.isArray(parsed)) {
                        importedGames = parsed;
                    } else if (parsed.app === "GameVault" && Array.isArray(parsed.data)) {
                        importedGames = parsed.data;
                    } else {
                        throw new Error("O ficheiro TXT não possui a estrutura correta do GameVault.");
                    }

                    if (importedGames.length === 0) {
                        toast.classList.remove('opacity-100');
                        toast.classList.add('opacity-0');
                        return alert("O arquivo não contém informações de jogos.");
                    }

                    // Aguarda um pequeno atraso para a interface respirar e fechar o Toast de aviso
                    setTimeout(() => {
                        toast.classList.remove('opacity-100');
                        toast.classList.add('opacity-0');
                        toast.textContent = "Pressione voltar novamente para sair"; // Reseta o texto padrão

                        if (confirm(`Encontrados ${importedGames.length} cartões no arquivo TXT.\nDeseja recriar o visualizador HTML substituindo a sua lista atual?`)) {
                            games = importedGames;
                            
                            // Esta sequência mágica converte instantaneamente o array invisível no HTML da página
                            saveToCloud(games);
                            updatePlatforms();
                            renderGames(); 
                            
                            if (window.isPlatformMenuOpen) window.togglePlatformMenu();
                        }
                    }, 500);

                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                    alert("Erro! O arquivo TXT está corrompido ou não pertence a este App.");
                    console.error(err);
                }
                
                // Reseta o input para permitir selecionar o mesmo ficheiro no futuro
                event.target.value = '';
            };
            
            reader.onerror = function() {
                alert("Erro nativo de leitura do telemóvel ao abrir o TXT.");
            };

            reader.readAsText(file);
        };

                    await window.Capacitor.Plugins.Share.share({ title: 'Minha Coleção Web', url: savedFile.uri, dialogTitle: 'Salvar Arquivo HTML' });
                } else {
                    const url = URL.createObjectURL(file);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => { document.body.removeChild(link); window.URL.revokeObjectURL(url); }, 100);
                }

                if (window.isPlatformMenuOpen) window.togglePlatformMenu();

            } catch (err) {
                // Se a API nativa do celular bloquear, avisamos
                if(err.message !== "Plugins ausentes") alert("Erro ao gerar arquivo: " + err.message);
            } finally {
                if (btnElement) {
                    btnElement.innerHTML = originalBtnContent;
                    lucide.createIcons({ root: btnElement });
                    btnElement.disabled = false;
                }
            }
        };

        // --- EXPORTAÇÃO SOFISTICADA PARA EXCEL ---
        window.exportarPlanilhaSofisticada = async function(btnElement) {
            if (!games || games.length === 0) return alert("Sua coleção está vazia!");

            // Modifica o botão para mostrar que está a carregar
            const originalBtnContent = btnElement ? btnElement.innerHTML : '';
            if (btnElement) {
                btnElement.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> Processando...';
                lucide.createIcons({ root: btnElement });
                btnElement.disabled = true;
            }

            try {
                // Inicia o Workbook
                const workbook = new ExcelJS.Workbook();
                workbook.creator = 'GameVault App';
                workbook.created = new Date();

                // ==========================================
                // ABA 1: DASHBOARD (RESUMO)
                // ==========================================
                const sheetResumo = workbook.addWorksheet('📊 Dashboard', { properties: { tabColor: { argb: 'FF0ea5e9' } } });
                
                // Título Principal
                sheetResumo.mergeCells('A1:C2');
                const titleCell = sheetResumo.getCell('A1');
                titleCell.value = 'Relatório Geral - GameVault';
                titleCell.font = { name: 'Arial', size: 16, bold: true, color: { argb: 'FFFFFFFF' } };
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0f172a' } };
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };

                // Estatísticas Básicas (Com proteções Null/Undefined)
                const totalEmprestados = games.filter(g => g.isBorrowed).length;
                const plataformasUnicas = [...new Set(games.flatMap(g => g.platforms || (g.platform ? [g.platform] : [])))];

                sheetResumo.getColumn('A').width = 30;
                sheetResumo.getColumn('B').width = 20;

                sheetResumo.getCell('A4').value = 'MÉTRICAS DA COLEÇÃO';
                sheetResumo.getCell('A4').font = { bold: true, color: { argb: 'FF0ea5e9' } };
                
                sheetResumo.addRow(['Total de Jogos', games.length]);
                sheetResumo.addRow(['Jogos Emprestados', totalEmprestados]);
                sheetResumo.addRow(['Plataformas Diferentes', plataformasUnicas.length]);
                sheetResumo.addRow(['Data de Exportação', new Date().toLocaleDateString('pt-BR')]);

                for(let i = 5; i <= 8; i++) {
                    sheetResumo.getCell(`A${i}`).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                    sheetResumo.getCell(`A${i}`).border = { bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } } };
                    sheetResumo.getCell(`B${i}`).font = { bold: true };
                    sheetResumo.getCell(`B${i}`).alignment = { horizontal: 'center' };
                    sheetResumo.getCell(`B${i}`).border = { bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } } };
                }

                // ==========================================
                // ABA 2: BANCO DE DADOS (COLEÇÃO)
                // ==========================================
                const sheetDados = workbook.addWorksheet('🎮 Banco de Dados', { properties: { tabColor: { argb: 'FF10b981' } } });

                sheetDados.columns = [
                    { header: 'Título do Jogo', key: 'title', width: 40 },
                    { header: 'Plataformas', key: 'platforms', width: 25 },
                    { header: 'Mídias', key: 'medias', width: 20 },
                    { header: 'Status', key: 'status', width: 20 },
                    { header: 'Emprestado Para', key: 'borrowedTo', width: 25 }
                ];

                const headerRow = sheetDados.getRow(1);
                headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF334155' } };
                headerRow.alignment = { vertical: 'middle', horizontal: 'center' };
                headerRow.height = 25;
                sheetDados.autoFilter = 'A1:E1';

                const sortedGames = [...games].sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                
                sortedGames.forEach((g, index) => {
                    // Mapeamento protegido contra null/undefined
                    const pList = g.platforms || (g.platform ? [g.platform] : []);
                    const plats = pList.map(p => {
                        const found = PLATFORMS.find(pl => pl.id === p);
                        return found ? found.name : (p || '').toUpperCase();
                    }).join(', ');

                    const mList = g.medias || [];
                    const meds = mList.map(m => {
                        const found = MEDIAS.find(md => md.id === m);
                        return found ? found.name : (m || '').toUpperCase();
                    }).join(', ');

                    let statusStr = '🟢 Na Coleção';
                    if (g.isWishlist) statusStr = '⭐ Lista de Desejos';
                    else if (g.isBorrowed) statusStr = '🔴 Emprestado';
                    
                    const row = sheetDados.addRow({
                        title: g.title || 'Sem Título',
                        platforms: plats || '-',
                        medias: meds || '-',
                        status: statusStr,
                        borrowedTo: g.isBorrowed ? (g.borrowedTo || '-') : '-'
                    });

                    if (index % 2 === 0) {
                        row.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                    }
                    
                    row.getCell('status').alignment = { horizontal: 'center' };
                    if (g.isBorrowed) row.getCell('status').font = { color: { argb: 'FFDC2626' }, bold: true };
            if (g.isWishlist) row.getCell('status').font = { color: { argb: 'FFD97706' }, bold: true };
            if (g.isPlaying) row.getCell('status').font = { color: { argb: 'FF3B82F6' }, bold: true };
        });

        // Geração do Arquivo
                const buffer = await workbook.xlsx.writeBuffer();
                const fileName = `GameVault_Colecao_${new Date().getTime()}.xlsx`;
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                // Verifica se está rodando de forma Nativa no celular via Capacitor
                if (window.Capacitor && window.Capacitor.isNative) {
                    const Filesystem = window.Capacitor.Plugins.Filesystem;
                    const Share = window.Capacitor.Plugins.Share;

                    if (!Filesystem || !Share) {
                        alert("⚠️ ERRO: Para baixar no telemóvel nativamente, instale os plugins de Filesystem e Share do Capacitor.");
                        throw new Error("Plugins Nativos Ausentes");
                    }

                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            if (typeof reader.result === 'string') resolve(reader.result.split(',')[1]);
                            else reject(new Error("Falha ao processar Base64"));
                        };
                        reader.onerror = () => reject(new Error("Erro ao ler o ficheiro"));
                        reader.readAsDataURL(blob);
                    });

                    const savedFile = await Filesystem.writeFile({
                        path: fileName,
                        data: base64Data,
                        directory: 'CACHE'
                    });

                    await Share.share({
                        title: 'Exportação GameVault',
                        text: 'Aqui está o backup da minha coleção GameVault!',
                        url: savedFile.uri,
                        dialogTitle: 'Salvar Planilha XLSX'
                    });
                    
                } else {
                    // Navegador Mobile (Web API Share) ou PC Clássico
                    const file = new File([blob], fileName, { type: blob.type });

                    // Se for um celular abrindo pelo navegador, tenta chamar a tela nativa de compartilhamento/salvamento
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Planilha GameVault',
                                text: 'Aqui está minha coleção exportada.'
                            });
                        } catch (shareErr) {
                            console.log("Usuário cancelou ou falhou o share:", shareErr);
                        }
                    } else {
                        // Fallback PC (Cria o link invisível e clica)
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = fileName;
                        document.body.appendChild(link);
                        link.click();
                        
                        // Limpeza de memória
                        setTimeout(() => {
                            document.body.removeChild(link);
                            window.URL.revokeObjectURL(url);
                        }, 100);
                    }
                }

                if (window.isPlatformMenuOpen) window.togglePlatformMenu();

            } catch (err) {
                console.error("Erro na exportação Excel:", err);
                if(err.message !== "Plugins Nativos Ausentes"){
                    alert("Falha ao gerar a planilha. Erro: " + (err.message || "Desconhecido"));
                }
            } finally {
                if (btnElement) {
                    btnElement.innerHTML = originalBtnContent;
                    lucide.createIcons({ root: btnElement });
                    btnElement.disabled = false;
                }
            }
        };

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            dom.searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderGames();
            });

            dom.fIsBorrowed.addEventListener('change', (e) => toggleBorrowedUI(e.target.checked));
            dom.fCoverUrl.addEventListener('input', (e) => {
                formData_covers[formData_activePlatformCover] = e.target.value;
                renderCoverPreview();
            });
            dom.apiSearchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleApiSearch(); });
            dom.fSynopsis.addEventListener('input', () => dom.btnTranslate.disabled = !dom.fSynopsis.value.trim());
        }

        // --- UI FUNCTIONS ---
        window.toggleWishlistUI = function(isWish) {
            if (isWish) {
                dom.borrowedCard.classList.add('hidden');
                dom.fIsBorrowed.checked = false;
                toggleBorrowedUI(false);
            } else {
                dom.borrowedCard.classList.remove('hidden');
            }
        }

        window.togglePlatformMenu = function() {
            window.isPlatformMenuOpen = !window.isPlatformMenuOpen;
            const dropdown = document.getElementById('platform-dropdown');
            const chevron = document.getElementById('platform-menu-chevron');
            const logo = document.getElementById('main-app-logo'); 
            
            if (window.isPlatformMenuOpen) {
                dropdown.classList.remove('-translate-y-full', 'opacity-0', 'pointer-events-none');
                dropdown.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
                chevron.classList.add('rotate-180');
                logo.classList.add('logo-glow-active'); 
            } else {
                dropdown.classList.add('-translate-y-full', 'opacity-0', 'pointer-events-none');
                dropdown.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
                chevron.classList.remove('rotate-180');
                if (window.filterPlatform === 'all') {
                    logo.classList.remove('logo-glow-active'); 
                }
            }
        }

        window.setPlatformFilter = function(platformId) {
            window.filterPlatform = platformId;
            updatePlatforms();
            renderGames();
            if (window.isPlatformMenuOpen) window.togglePlatformMenu();
        }

        function updatePlatforms() {
            const colecaoGeralCount = games.filter(g => !g.isWishlist).length;
            const wishlistCount = games.filter(g => g.isWishlist).length;

            let htmlDropdown = `
                <button onclick="window.setPlatformFilter('all')" class="p-3 rounded-xl flex flex-col items-center justify-center gap-1.5 transition-all border ${window.filterPlatform === 'all' ? 'bg-blue-600 border-blue-500 text-white shadow-[0_4px_10px_rgba(59,130,246,0.3)]' : 'bg-slate-950 border-slate-800 text-slate-400'}">
                    <i data-lucide="library" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Coleção</span>
                    <span class="text-[9px] opacity-70 mt-[-2px]">${colecaoGeralCount}</span>
                </button>
                <button onclick="window.setPlatformFilter('wishlist')" class="p-3 rounded-xl flex flex-col items-center justify-center gap-1.5 transition-all border ${window.filterPlatform === 'wishlist' ? 'bg-yellow-500 border-yellow-400 text-slate-900 shadow-[0_4px_10px_rgba(234,179,8,0.3)]' : 'bg-slate-950 border-slate-800 text-slate-400'}">
                    <i data-lucide="star" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Desejos</span>
                    <span class="text-[9px] opacity-70 mt-[-2px]">${wishlistCount}</span>
                </button>
            `;

            PLATFORMS.forEach(p => {
                const count = games.filter(g => !g.isWishlist && (g.platforms || (g.platform ? [g.platform] : [])).includes(p.id)).length;
                const isActive = window.filterPlatform === p.id;

                const dropClass = isActive ? 'bg-blue-600 border-blue-500 text-white shadow-[0_4px_10px_rgba(59,130,246,0.3)]' : 'bg-slate-950 border-slate-800 text-slate-400';
                htmlDropdown += `
                    <button onclick="window.setPlatformFilter('${p.id}')" class="p-3 rounded-xl flex flex-col items-center justify-center gap-1.5 transition-all border ${dropClass}">
                        <i data-lucide="${p.icon}" class="w-5 h-5"></i>
                        <span class="text-[10px] font-bold uppercase">${p.name}</span>
                        <span class="text-[9px] opacity-70 mt-[-2px]">${count}</span>
                    </button>
                `;
            });
            
            dom.dropdownPlatformsContainer.innerHTML = htmlDropdown;
            lucide.createIcons({ root: dom.dropdownPlatformsContainer });

            const currentP = PLATFORMS.find(p => p.id === window.filterPlatform);
            let pageTitle = 'GameVault';
            let sectionName = 'A Sua Coleção';

            if (window.filterPlatform === 'wishlist') {
                pageTitle = 'Desejos';
                sectionName = 'Lista de Desejos';
            } else if (window.filterPlatform !== 'all') {
                pageTitle = currentP.name;
                sectionName = currentP.name;
            }

            document.getElementById('current-platform-title').textContent = pageTitle;
            dom.sectionTitle.textContent = sectionName;

            const logo = document.getElementById('main-app-logo');
            if (window.filterPlatform !== 'all' || window.isPlatformMenuOpen) {
                logo.classList.add('logo-glow-active');
            } else {
                logo.classList.remove('logo-glow-active');
            }
        }

        function toggleBorrowedUI(isBorrowed) {
            if (isBorrowed) {
                dom.borrowedLabel.classList.replace('text-slate-400', 'text-red-400');
                dom.borrowedToContainer.classList.remove('hidden');
            } else {
                dom.borrowedLabel.classList.replace('text-red-400', 'text-slate-400');
                dom.borrowedToContainer.classList.add('hidden');
                dom.fBorrowedTo.value = '';
            }
        }
        
        window.togglePlatformForm = function(id) {
            if (formData_selectedPlatforms.includes(id)) {
                formData_selectedPlatforms = formData_selectedPlatforms.filter(p => p !== id);
                if (formData_activePlatformCover === id) formData_activePlatformCover = formData_selectedPlatforms[0] || 'default';
            } else {
                formData_selectedPlatforms.push(id);
                if (formData_selectedPlatforms.length === 1 || formData_activePlatformCover === 'default') formData_activePlatformCover = id;
            }
            renderPlatformToggles();
            renderModalCoverUI();
        }

        function renderPlatformToggles() {
            let html = '';
            PLATFORMS.forEach(p => {
                const isSelected = formData_selectedPlatforms.includes(p.id);
                html += `<button type="button" onclick="window.togglePlatformForm('${p.id}')" class="px-2.5 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 border transition-all focus:outline-none ${isSelected ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-500'}"><i data-lucide="${p.icon}" class="w-3 h-3"></i>${p.name}</button>`;
            });
            dom.fPlatformsContainer.innerHTML = html;
            lucide.createIcons({ root: dom.fPlatformsContainer });
        }

        window.toggleLanguageForm = function(id) {
            formData_selectedLanguages.includes(id) ? formData_selectedLanguages = formData_selectedLanguages.filter(l => l !== id) : formData_selectedLanguages.push(id);
            renderLanguageToggles();
        }

        function renderLanguageToggles() {
            let html = '';
            LANGUAGES.forEach(l => {
                const isSelected = formData_selectedLanguages.includes(l.id);
                html += `<button type="button" onclick="window.toggleLanguageForm('${l.id}')" class="px-2 py-1 rounded-lg text-[9px] font-bold border transition-all focus:outline-none ${isSelected ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-500'}">${l.short}</button>`;
            });
            dom.fLanguagesContainer.innerHTML = html;
        }

        window.toggleMediaForm = function(id) {
            formData_selectedMedias.includes(id) ? formData_selectedMedias = formData_selectedMedias.filter(m => m !== id) : formData_selectedMedias.push(id);
            renderMediaToggles();
        }

        function renderMediaToggles() {
            let html = '';
            MEDIAS.forEach(m => {
                const isSelected = formData_selectedMedias.includes(m.id);
                html += `<button type="button" onclick="window.toggleMediaForm('${m.id}')" class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 border transition-all focus:outline-none ${isSelected ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-500'}"><i data-lucide="${m.icon}" class="w-3 h-3"></i>${m.name}</button>`;
            });
            dom.fMediasContainer.innerHTML = html;
            lucide.createIcons({ root: dom.fMediasContainer });
        }

        window.setActiveCoverTab = function(pId) { formData_activePlatformCover = pId; renderModalCoverUI(); };

        function renderModalCoverUI() {
            const tabsContainer = document.getElementById('modal-cover-tabs');
            if (formData_selectedPlatforms.length > 1) {
                let html = '';
                PLATFORMS.filter(p => formData_selectedPlatforms.includes(p.id)).forEach(p => {
                    const isActive = (p.id === formData_activePlatformCover);
                    html += `<button type="button" onclick="window.setActiveCoverTab('${p.id}')" class="px-2 py-0.5 text-[8px] font-bold uppercase rounded border ${isActive ? 'bg-blue-600 text-white border-blue-500' : 'bg-slate-800 text-slate-400 border-slate-700'}">${p.id}</button>`;

                tabsContainer.classList.remove('hidden');

            dom.fCoverUrl.value = formData_covers[formData_activePlatformCover] || '';
            renderCoverPreview(); 
        }

        function renderCoverPreview() {
            const url = dom.fCoverUrl.value;
            let html = url 
                ? `<img src="${url}" alt="Capa" class="w-full h-full object-contain p-0.5" />`
                : `<div class="flex flex-col items-center justify-center h-full text-slate-700"><i data-lucide="image" class="w-5 h-5 mb-1"></i><span class="text-[8px] uppercase tracking-widest font-bold">Vazio</span></div>`;

            if (formData_coverOptions.length > 1) {
                html += `
                    <div class="absolute inset-x-0 bottom-0 bg-slate-950/90 backdrop-blur px-1 py-1 flex justify-between items-center">

                        <span class="text-white text-[8px] font-bold">${formData_currentCoverIndex + 1}/${formData_coverOptions.length}</span>

                    </div>
                `;
            }

            dom.coverPreviewContainer.innerHTML = html;
            lucide.createIcons({ root: dom.coverPreviewContainer });
        }

        window.cycleCover = function(dir) {
            if (!formData_coverOptions.length) return;
            formData_currentCoverIndex = (formData_currentCoverIndex + dir + formData_coverOptions.length) % formData_coverOptions.length;
            const newUrl = formData_coverOptions[formData_currentCoverIndex];
            dom.fCoverUrl.value = formData_covers[formData_activePlatformCover] = newUrl;
            renderCoverPreview();
        }

        function renderPlayingNow() {
            const playingGames = games.filter(g => g.isPlaying && !g.isWishlist);
            
            if (playingGames.length === 0) {
                dom.playingNowSection.classList.add('hidden');
                dom.playingNowSection.classList.remove('flex');
            } else {
                dom.playingNowSection.classList.remove('hidden');
                dom.playingNowSection.classList.add('flex');
                
                dom.playingNowGrid.innerHTML = playingGames.map(game => {
                    let validCovers = (game.platforms || []).map(pId => game.covers && game.covers[pId]).filter(Boolean);
                    if (!validCovers.length && game.coverUrl) validCovers.push(game.coverUrl);
                    const cover = validCovers[0] || '';
                    
                    return `
                        <div onclick="window.openEditModal('${game.id}')" class="min-w-[95px] w-[95px] bg-slate-900 border border-blue-500/50 rounded-xl flex flex-col overflow-hidden active:scale-95 transition-transform shrink-0 shadow-[0_4px_15px_rgba(59,130,246,0.15)] relative">

                                ${cover ? `<img src="${cover}" class="w-full h-full object-contain p-0.5" loading="lazy" />` : `<i data-lucide="image" class="w-5 h-5 text-slate-700"></i>`}
                                <div class="absolute -top-1 -right-1 bg-blue-600 rounded-full p-1.5 shadow-lg border-2 border-slate-900 z-10"><i data-lucide="play" class="w-2.5 h-2.5 text-white fill-white"></i></div>
                            </div>
                            <div class="p-1.5 flex-1 flex items-center justify-center bg-blue-600/10 border-t border-blue-500/30">
                                <h3 class="font-bold text-blue-100 text-[8px] leading-tight line-clamp-2 text-center uppercase">${game.title}</h3>
                            </div>
                        </div>
                    `;
                }).join('');
                lucide.createIcons({ root: dom.playingNowGrid });
            }
        }

        function renderGames() {
            const filteredGames = games.filter(g => {
                const gamePlats = g.platforms || (g.platform ? [g.platform] : []);
                
                let matchPlatform = false;
                if (window.filterPlatform === 'wishlist') {
                    matchPlatform = g.isWishlist;
                } else if (window.filterPlatform === 'all') {
                    matchPlatform = !g.isWishlist; 
                } else {
                    matchPlatform = !g.isWishlist && gamePlats.includes(window.filterPlatform);
                }

                const matchSearch = g.title.toLowerCase().includes(searchQuery);
                return matchPlatform && matchSearch;
            }).sort((a, b) => a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' }));

            dom.displayCount.textContent = filteredGames.length;

            if (filteredGames.length === 0) {
                dom.gamesGrid.innerHTML = '';
                dom.emptyState.classList.remove('hidden');
                dom.emptyState.classList.add('flex');
            } else {
                dom.emptyState.classList.add('hidden');
                dom.emptyState.classList.remove('flex');
                
                let html = '';
                filteredGames.forEach(game => {
                    const gamePlats = game.platforms || (game.platform ? [game.platform] : []);
                    let borderStyle = 'border-slate-800';
                    
                    if (game.isBorrowed) borderStyle = 'border-red-500/50 outline outline-1 outline-red-500/30';
                    if (game.isWishlist) borderStyle = 'border-yellow-500/50 outline outline-1 outline-yellow-500/30';
                        
                    let validCovers = gamePlats.filter(pId => game.covers && game.covers[pId]).map(pId => game.covers[pId]);
                    if (window.filterPlatform !== 'all' && window.filterPlatform !== 'wishlist' && game.covers && game.covers[window.filterPlatform]) {
                        validCovers = [game.covers[window.filterPlatform], ...validCovers.filter(c => c !== game.covers[window.filterPlatform])];
                    }
                    if (!validCovers.length && game.coverUrl) validCovers.push(game.coverUrl);
                    validCovers = [...new Set(validCovers)]; 

                    const coverInner = validCovers.length > 0
                        ? `<img src="${validCovers[0]}" class="w-full h-full object-contain p-0.5 bg-slate-950" loading="lazy" />`
                        : `<div class="w-full h-full flex items-center justify-center bg-slate-900 text-slate-700"><i data-lucide="image" class="w-6 h-6"></i></div>`;

                    let statusBadge = '';
                    if (game.isBorrowed) {
                        statusBadge = `<div class="absolute top-1.5 right-1.5 bg-red-600 rounded-full p-1 shadow-md"><i data-lucide="user-minus" class="w-2.5 h-2.5 text-white"></i></div>`;
                    } else if (game.isWishlist) {
                        statusBadge = `<div class="absolute top-1.5 right-1.5 bg-yellow-500 rounded-full p-1 shadow-md"><i data-lucide="star" class="w-2.5 h-2.5 text-slate-900 fill-slate-900"></i></div>`;
                    }

                    let platformTagsHtml = '';
                    gamePlats.forEach(pId => {
                        const pObj = PLATFORMS.find(p => p.id === pId);
                        if (pObj) platformTagsHtml += `<span class="bg-slate-950 border border-slate-700 text-blue-400 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">${pObj.name}</span>`;
                    });

                    let mediasHtml = '';
                    if (!game.isWishlist) {
                        mediasHtml = `
                            <div class="absolute bottom-1 right-1 flex gap-0.5">
                                ${(game.medias || []).map(mId => `<div class="bg-slate-900/90 rounded-full p-0.5"><i data-lucide="${MEDIAS.find(m=>m.id===mId)?.icon}" class="w-2.5 h-2.5 text-emerald-400"></i></div>`).join('')}
                            </div>
                        `;
                    }

                    html += `
                        <div onclick="window.openEditModal('${game.id}')" class="bg-slate-900 border rounded-2xl flex flex-col overflow-hidden active:scale-95 transition-transform ${borderStyle}">
                            <div class="relative aspect-[3/4] bg-slate-950 border-b border-slate-800">
                                ${coverInner}
                                ${statusBadge}
                                ${mediasHtml}
                            </div>
                            <div class="p-2 flex flex-col justify-between flex-1">
                                <h3 class="font-bold text-white text-[10px] leading-tight line-clamp-2 uppercase mb-1">${game.title}</h3>
                                <div class="flex items-center justify-between">
                                    <div class="flex gap-1 items-center flex-wrap">${platformTagsHtml}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                dom.gamesGrid.innerHTML = html;
                lucide.createIcons({ root: dom.gamesGrid });
            }
            
            // Renderiza também a sessão "Jogando Agora"
            renderPlayingNow();
        }

        // --- CRUD / MODAL FUNCTIONS ---
        window.openNewGameModal = function() {
            editingGameId = null;
            dom.fTitle.value = dom.fCoverUrl.value = dom.fSynopsis.value = dom.fBorrowedTo.value = '';
            formData_selectedPlatforms = ['ps4']; 
            formData_selectedLanguages = ['pt-br-audio', 'pt-br-leg']; 
            formData_selectedMedias = ['fisica'];
            formData_covers = {};
            formData_activePlatformCover = 'ps4';
            
            dom.fIsPlaying.checked = false;
            dom.fIsWishlist.checked = window.filterPlatform === 'wishlist'; 
            dom.fIsBorrowed.checked = false;
            toggleWishlistUI(dom.fIsWishlist.checked);
            
            formData_coverOptions = []; formData_currentCoverIndex = 0;
            dom.apiSearchInput.value = ''; dom.apiResultsContainer.innerHTML = ''; dom.apiResultsContainer.classList.add('hidden');
            dom.btnTranslate.disabled = true;
            
            renderPlatformToggles(); renderLanguageToggles(); renderMediaToggles(); renderModalCoverUI();

            dom.modalTitleText.textContent = 'Adicionar Jogo';
            dom.modalTitleIcon.setAttribute('data-lucide', 'plus-circle');
            dom.modalTitleIcon.className = "w-5 h-5 text-blue-400";
            dom.btnDelete.classList.add('hidden');

            dom.modal.classList.remove('hidden'); dom.modal.classList.add('flex');
            lucide.createIcons();
        }

        window.openEditModal = function(id) {
            const game = games.find(g => g.id === id);
            if(!game) return;
            editingGameId = id;

            dom.fTitle.value = game.title || '';
            formData_selectedPlatforms = game.platforms?.length ? [...game.platforms] : (game.platform ? [game.platform] : []);
            formData_covers = game.covers ? { ...game.covers } : {};
            if (game.coverUrl && !Object.keys(formData_covers).length) formData_covers[formData_selectedPlatforms[0] || 'default'] = game.coverUrl;
            formData_activePlatformCover = formData_selectedPlatforms[0] || 'default';
            
            formData_selectedLanguages = Array.isArray(game.languages) ? [...game.languages] : [];
            formData_selectedMedias = game.medias ? [...game.medias] : [];
            dom.fSynopsis.value = game.synopsis || '';
            
            dom.fIsPlaying.checked = game.isPlaying || false;
            dom.fIsWishlist.checked = game.isWishlist || false;
            dom.fIsBorrowed.checked = game.isBorrowed || false;
            dom.fBorrowedTo.value = game.borrowedTo || '';
            
            toggleWishlistUI(game.isWishlist);

            formData_coverOptions = []; formData_currentCoverIndex = 0;
            dom.apiSearchInput.value = ''; dom.apiResultsContainer.innerHTML = ''; dom.apiResultsContainer.classList.add('hidden');
            dom.btnTranslate.disabled = !game.synopsis;

            renderPlatformToggles(); renderLanguageToggles(); renderMediaToggles(); renderModalCoverUI();

            dom.modalTitleText.textContent = 'Editar Jogo';
            dom.modalTitleIcon.setAttribute('data-lucide', 'edit-3');
            dom.modalTitleIcon.className = "w-5 h-5 text-amber-400";
            dom.btnDelete.classList.remove('hidden');

            dom.modal.classList.remove('hidden'); dom.modal.classList.add('flex');
            lucide.createIcons();
        }

        window.closeModal = function() {
            dom.modal.classList.add('hidden'); dom.modal.classList.remove('flex');
        }

        window.saveGame = function() {
            const title = dom.fTitle.value.trim();
            if (!title || !formData_selectedPlatforms.length) return alert("Preencha Título e Plataforma!");

            const isWishlist = dom.fIsWishlist.checked;
            const isBorrowed = isWishlist ? false : dom.fIsBorrowed.checked; 

            const gameData = {
                title: title.toUpperCase(), platforms: formData_selectedPlatforms,
                covers: formData_covers, coverUrl: formData_covers[formData_selectedPlatforms[0]] || dom.fCoverUrl.value || '', 
                languages: formData_selectedLanguages, medias: formData_selectedMedias, 
                synopsis: dom.fSynopsis.value, isWishlist: isWishlist,
                isPlaying: dom.fIsPlaying.checked,
                isBorrowed: isBorrowed,
                borrowedTo: isBorrowed ? dom.fBorrowedTo.value : ''
            };

            games = Array.isArray(games) ? games : Object.values(games || {});
            if (editingGameId) {
                gameData.id = editingGameId;
                const idx = games.findIndex(g => g && g.id === editingGameId);
                if(idx !== -1) games[idx] = gameData;
            } else {
                gameData.id = Date.now().toString();
                games.push(gameData);
            }

            updatePlatforms(); renderGames(); closeModal(); saveToCloud(games); 
        }

        window.deleteGame = function() {
            if(!editingGameId) return;
            if (confirm("Deletar jogo?")) {
                games = games.filter(g => g && g.id !== editingGameId);
                updatePlatforms(); renderGames(); closeModal(); saveToCloud(games); 
            }
        }

        // --- API FUNCTIONS ---
        window.handleApiSearch = async function() {
            const query = dom.apiSearchInput.value.trim();
            if (!query) return;

            dom.btnApiSearch.disabled = true; dom.apiSearchIcon.classList.add('hidden'); dom.apiSearchLoader.classList.remove('hidden');

            try {
                const source = dom.apiSourceSelect.value;
                if (source === 'igdb') {
                    const tRes = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://id.twitch.tv/oauth2/token?client_id=ui07l07p7gy1wsfcjhueuxjiixiwnq&client_secret=tih38jsxi47bxo2056jg6ho65xge7y&grant_type=client_credentials')}`, { method: 'POST' });
                    const token = (await tRes.json()).access_token;
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.igdb.com/v4/games')}`, {
                        method: 'POST', headers: { 'Accept': 'application/json', 'Client-ID': 'ui07l07p7gy1wsfcjhueuxjiixiwnq', 'Authorization': `Bearer ${token}` },
                        body: `search "${query.replace(/"/g, '')}"; fields name, cover.image_id, screenshots.image_id, summary; limit 10;`
                    });
                    apiResultsList = (await res.json()).map(g => {
                        const covers = [];
                        if (g.cover?.image_id) covers.push(`https://images.igdb.com/igdb/image/upload/t_1080p/${g.cover.image_id}.jpg`);
                        if (g.screenshots) g.screenshots.forEach(sc => covers.push(`https://images.igdb.com/igdb/image/upload/t_1080p/${sc.image_id}.jpg`));
                        return { title: g.name, covers, synopsis: g.summary || "" };
                    });
                } else {
                    const key = "9ff2c491e42cd10e2aad3c1d81e357a3081d5b059cc3b7915ba6c470a7b70c9f";
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://api.thegamesdb.net/v1/Games/ByGameName?name=${encodeURIComponent(query)}&apikey=${key}&fields=overview`)}`);
                    const data = await res.json();
                    if (!data.data?.games) apiResultsList = [];
                    else {
                        const gamesData = data.data.games.slice(0, 10);
                        const imgRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://api.thegamesdb.net/v1/Games/Images?games_id=${gamesData.map(g=>g.id).join(',')}&filter[type]=boxart&apikey=${key}`)}`).catch(()=>null);
                        const imgData = imgRes && imgRes.ok ? await imgRes.json() : null;
                        const baseUrl = imgData?.data?.base_url?.original || 'https://cdn.thegamesdb.net/images/original/';
                        let imagesMap = {};
                        if(imgData?.data?.images) {
                            Object.keys(imgData.data.images).forEach(gId => {
                                const imgs = imgData.data.images[gId];
                                const front = imgs.filter(i => i.side === 'front');
                                imagesMap[gId] = (front.length ? front : imgs).map(i => baseUrl + i.filename);
                            });
                        }
                        apiResultsList = gamesData.map(g => ({ title: g.game_title, covers: imagesMap[g.id] || [], synopsis: g.overview || "" }));
                    }
                }
                renderApiResults();
            } catch (err) { alert("Erro de API."); } 
            finally { dom.btnApiSearch.disabled = false; dom.apiSearchIcon.classList.remove('hidden'); dom.apiSearchLoader.classList.add('hidden'); }
        }

        function renderApiResults() {
            if (!apiResultsList.length) dom.apiResultsContainer.innerHTML = '<div class="p-3 text-xs text-slate-500 text-center">Nada encontrado.</div>';
            else {
                dom.apiResultsContainer.innerHTML = apiResultsList.map((r, i) => `
                    <div onclick="window.selectApiResult(${i})" class="p-2 flex items-center justify-between active:bg-slate-800 transition-colors cursor-pointer">
                        <div class="flex items-center gap-2 truncate">
                            <img src="${r.covers[0] || ''}" class="w-6 h-8 bg-slate-950 object-cover border border-slate-800 shrink-0" onerror="this.style.display='none'" />
                            <span class="text-[10px] font-bold text-white truncate uppercase">${r.title}</span>
                        </div>
                        <i data-lucide="download" class="w-3.5 h-3.5 text-blue-400 shrink-0 ml-2"></i>
                    </div>
                `).join('');
                lucide.createIcons({ root: dom.apiResultsContainer });
            }
            dom.apiResultsContainer.classList.remove('hidden');
        }

        window.selectApiResult = function(index) {
            const result = apiResultsList[index];
            dom.fTitle.value = result.title.toUpperCase(); dom.fSynopsis.value = result.synopsis;
            formData_coverOptions = result.covers; formData_currentCoverIndex = 0;
            dom.fCoverUrl.value = formData_covers[formData_activePlatformCover] = result.covers[0] || '';
            dom.btnTranslate.disabled = !result.synopsis;
            renderCoverPreview(); dom.apiResultsContainer.classList.add('hidden');
        }

        window.handleTranslate = async function() {
            if (!dom.fSynopsis.value.trim()) return;
            dom.btnTranslate.disabled = true; dom.translateNormal.classList.add('hidden'); dom.translateSpin.classList.remove('hidden');
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(dom.fSynopsis.value)}`);
                const data = await res.json();
                if (data && data[0]) dom.fSynopsis.value = data[0].map(i => i[0]).join('');
            } catch (err) {} 
            finally { dom.btnTranslate.disabled = false; dom.translateNormal.classList.remove('hidden'); dom.translateSpin.classList.add('hidden'); }
        }

        init();
    </script>
</body>
</html>
